<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>배재연의 자기소개</title>
    <!-- 구글 폰트: Poor Story (타이틀용) 및 Jua (본문용) -->
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Poor+Story&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Jua', sans-serif; 
            line-height: 1.5; 
            color: #fff; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
        }

        /* 타이틀에 Poor Story 폰트 적용 */
        h1, h2 { font-family: 'Poor Story', cursive; }

        /* 상단 네비게이션 */
        nav { 
            position: fixed; top: 0; width: 100%; padding: 25.5px; 
            text-align: center; z-index: 1000; background: rgba(0,0,0,0.3); 
            backdrop-filter: blur(10px); font-size: 2.21em;
        }
        nav a { color: #fff; text-decoration: none; margin: 0 34px; font-weight: bold; transition: 0.3s; }
        nav a:hover { color: #ffcc00; }

        /* 섹션 설정 */
        section { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; padding: 42.5px;
        }

        /* 카드 설정 */
        .card { 
            background: rgba(255, 255, 255, 0.15); 
            padding: 85px; border-radius: 51px; 
            backdrop-filter: blur(20px); border: 1.7px solid rgba(255,255,255,0.3);
            text-align: center; width: 72.25%; max-width: 1190px;
        }

        /* 글자 크기 */
        h1 { font-size: 6.8em; margin-bottom: 42.5px; }
        h2 { font-size: 5.95em; margin-bottom: 34px; color: #ffcc00; }
        p { font-size: 3.06em; }
        
        /* 이미지 설정 */
        img { 
            width: 765px; height: 765px; 
            border-radius: 50%; margin-bottom: 42.5px; 
            border: 12.75px solid #fff;
            object-fit: contain; 
            background-color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <nav>
        <a href="#intro">소개</a>
        <a href="#study">학습내용</a>
        <a href="#goal">목표</a>
        <a href="#hobby">취미</a>
    </nav>

    <section id="intro">
        <div class="card">
            <h1>배재연의 자기소개</h1>
            <img src="./images/캐릭커처.png" alt="프로필">
            <p>AI 엔지니어를 꿈꾸는<br>열정 가득한 학생입니다.</p>
        </div>
    </section>

    <section id="study">
        <div class="card">
            <h2>학습내용</h2>
            <img src="./images/캐릭커처1.png" alt="학습">
            <p>AI 리터러시와 HTML 구조 설계를 배웠고<br>AI 공부를 하고 있습니다.</p>
        </div>
    </section>

    <section id="goal">
        <div class="card">
            <h2>목표</h2>
            <p>"5개월 후, 파이썬을 활용한<br>AI 모델 하겠습니다!"</p>
        </div>
    </section>

    <section id="hobby">
        <div class="card">
            <h2>취미</h2>
            <img src="./images/취.png" alt="취미">
            <p>요리의 창의성과 에어로빅의 에너지를 통해<br>매일매일 성장하고 있습니다.</p>
        </div>
    </section>

</body>
</html>
