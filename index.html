<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>배재연의 자기소개</title>
    <!-- 구글 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Poor+Story&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Jua', sans-serif; 
            line-height: 1.5; 
            color: #fff; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
        }

        h1, h2 { font-family: 'Poor Story', cursive; }

        /* 상단 네비게이션 */
        nav { 
            position: fixed; top: 0; width: 100%; padding: 20px; 
            text-align: center; z-index: 1000; background: rgba(0,0,0,0.3); 
            backdrop-filter: blur(10px); font-size: 1.5em;
        }
        nav a { color: #fff; text-decoration: none; margin: 0 20px; font-weight: bold; }
        nav a:hover { color: #ffcc00; }

        /* [수정] min-height 사용: 100vh 고정 시 내용이 길어지면 겹치므로, 최소 높이로 변경 */
        section { 
            min-height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; padding: 100px 20px;
        }

        /* [수정] 카드 패딩 감소: 100% 비율에서 내용이 너무 꽉 차서 겹치지 않도록 공간 확보 */
        .card { 
            background: rgba(255, 255, 255, 0.15); 
            padding: 50px; border-radius: 40px; 
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.3);
            text-align: center; width: 80%; max-width: 900px;
        }

        /* [수정] 글자 크기 조정: 기존보다 가독성을 위해 살짝 축소하여 카드 내 배치 최적화 */
        h1 { font-size: 4em; margin-bottom: 30px; }
        h2 { font-size: 3.5em; margin-bottom: 25px; color: #ffcc00; }
        p { font-size: 1.8em; }
        
        /* [수정] 이미지 크기 반응형: 고정 픽셀(px) 대신 %와 max-width를 사용하여 화면 비율에 맞춰 자동 조절 */
        img { 
            width: 80%; max-width: 400px; height: auto; 
            border-radius: 50%; margin-bottom: 30px; 
            border: 8px solid #fff;
            background-color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <nav>
        <a href="#intro">소개</a>
        <a href="#study">학습내용</a>
        <a href="#goal">목표</a>
        <a href="#hobby">취미</a>
    </nav>

    <section id="intro">
        <div class="card">
            <h1>배재연의 자기소개</h1>
            <img src="./images/캐릭커처.png" alt="프로필">
            <p>AI 엔지니어를 꿈꾸는<br>열정 가득한 학생입니다.</p>
        </div>
    </section>

    <section id="study">
        <div class="card">
            <h2>학습내용</h2>
            <img src="./images/캐릭커처1.png" alt="학습">
            <p>AI 리터러시와 HTML 구조 설계를 배웠고<br>AI 공부를 하고 있습니다.</p>
        </div>
    </section>

    <section id="goal">
        <div class="card">
            <h2>목표</h2>
            <p>"5개월 후, 파이썬을 활용한<br>AI 모델 구현 전문가가 되겠습니다!"</p>
        </div>
    </section>

    <section id="hobby">
        <div class="card">
            <h2>취미</h2>
            <img src="./images/취.png" alt="취미">
            <p>요리의 창의성과 에어로빅의 에너지를 통해<br>매일매일 성장하고 있습니다.</p>
        </div>
    </section>

</body>
</html>
